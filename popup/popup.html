<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <div class="orb" aria-hidden="true"></div>
        <div>
          <div class="brand-title">Browser Agent</div>
          <div id="status-bar" class="status-line">
            <span id="status-dot"></span>
            <span id="status-text">Idle</span>
          </div>
        </div>
      </div>
      <nav class="toolbar" aria-label="Agent controls">
        <button id="new-chat-btn" class="icon-btn" title="New chat">＋</button>
        <button id="stop-btn" class="icon-btn danger" title="Stop agent" disabled>■</button>
        <button id="logs-link" class="icon-btn" title="View logs">◈</button>
        <button id="settings-link" class="icon-btn" title="Settings">⚙</button>
      </nav>
    </header>

    <main id="chat-shell">
      <div id="messages" aria-live="polite"></div>

      <section id="activity-card" hidden>
        <div class="activity-head">
          <span class="spinner"></span>
          <span id="activity-title">Working</span>
          <span id="iteration-counter"></span>
        </div>
        <div id="activity-message"></div>
        <div id="current-url"></div>
      </section>
    </main>

    <form id="composer">
      <textarea id="task-input" placeholder="Ask the agent to use this browser…" rows="1"></textarea>
      <button id="run-btn" type="submit" title="Send">➜</button>
    </form>

    <footer class="meta-strip">
      <label id="debug-label" title="Save detailed reasoning logs">
        <input type="checkbox" id="debug-checkbox">
        <span>Debug</span>
      </label>
      <span class="divider"></span>
      <span>Input <b id="input-backend-name">…</b></span>
      <a id="input-backend-change" href="#">change</a>
    </footer>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
